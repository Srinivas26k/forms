<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberArcMSP Consulting Services LLP | Scope Questions · Flat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --peach:      #F7C5A0;
  --peach-bg:   #FDE8D8;
  --cream:      #FFF8F2;
  --brown-skin: #8B5E3C;
  --brown-dark: #5C3D1E;
  --green-1:    #5B9E6F;
  --green-2:    #82C09A;
  --green-3:    #B8DEBC;
  --teal:       #4ABFBF;
  --teal-light: #A8E6E6;
  --blue:       #5B8DEF;
  --blue-light: #C9DBFF;
  --yellow:     #F5C842;
  --orange:     #F4845F;
  --red:        #E85D5D;
  --purple:     #9B7FE8;
  --pink:       #F4A7C3;
  --dark:       #2D2D2D;
  --mid:        #6B6B6B;
  --light:      #AAAAAA;
  --white:      #FFFFFF;
  --border:     #E8E0D8;
  --section-bg: #FDF6F0;
  --radius:     10px;
  --radius-lg:  16px;
}

html, body {
  height: 100%;
  font-family: 'Nunito', sans-serif;
  background: var(--peach-bg);
  overflow: hidden;
}

/* ── LAYOUT ──────────────────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 420px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ── LEFT PANEL — Illustration ──────────────────────────────────────────── */
.left-panel {
  background: var(--peach-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 32px 24px 0;
  position: relative;
  overflow: hidden;
}

.left-panel::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: #E8C9A8;
  border-radius: 0;
  z-index: 0;
}

.brand-mark {
  position: absolute;
  top: 28px; left: 28px;
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--brown-dark);
  letter-spacing: 0.5px;
  z-index: 10;
}
.brand-mark span { color: var(--teal); }

.progress-dots {
  position: absolute;
  top: 28px; right: 28px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--peach);
  border: 2px solid var(--brown-skin);
  transition: all 0.3s ease;
}
.dot.active { background: var(--teal); border-color: var(--teal); transform: scale(1.3); }
.dot.done   { background: var(--green-1); border-color: var(--green-1); }

/* section label badge */
.section-badge {
  position: absolute;
  top: 70px; left: 28px;
  background: var(--teal);
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 20px;
  z-index: 10;
  transition: all 0.4s ease;
}

/* ── SCENE SVG wrapper ───────────────────────────────────────────────────── */
.scene-wrap {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 380px;
}

/* ── RIGHT PANEL — Form ─────────────────────────────────────────────────── */
.right-panel {
  background: var(--white);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* top progress bar */
.top-bar {
  height: 4px;
  background: var(--border);
  flex-shrink: 0;
}
.top-bar-fill {
  height: 100%;
  background: var(--teal);
  border-radius: 0 2px 2px 0;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

/* form content area */
.form-area {
  flex: 1;
  overflow: hidden;
  position: relative;
  padding: 0;
}

/* step counter */
.step-counter {
  padding: 20px 52px 0;
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--light);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* question slide */
.q-slide {
  position: absolute;
  inset: 0;
  padding: 16px 52px 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  transition: none;
  overflow-y: auto;
}
.q-slide::-webkit-scrollbar { width: 4px; }
.q-slide::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.q-slide.enter-from-right {
  animation: slideInR 0.38s cubic-bezier(.4,0,.2,1) forwards;
}
.q-slide.enter-from-left {
  animation: slideInL 0.38s cubic-bezier(.4,0,.2,1) forwards;
}
.q-slide.exit-to-left {
  animation: slideOutL 0.32s cubic-bezier(.4,0,.2,1) forwards;
}
.q-slide.exit-to-right {
  animation: slideOutR 0.32s cubic-bezier(.4,0,.2,1) forwards;
}

@keyframes slideInR  { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:none; } }
@keyframes slideInL  { from { opacity:0; transform:translateX(-40px); } to { opacity:1; transform:none; } }
@keyframes slideOutL { from { opacity:1; transform:none; } to { opacity:0; transform:translateX(-40px); } }
@keyframes slideOutR { from { opacity:1; transform:none; } to { opacity:0; transform:translateX(40px); } }

/* question num */
.q-num-tag {
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* question text */
.q-title {
  font-family: 'Poppins', sans-serif;
  font-size: 21px;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.4;
  margin-bottom: 28px;
}
.q-title.sm { font-size: 18px; }

/* ── INPUT COMPONENTS ────────────────────────────────────────────────────── */
.flat-input {
  width: 100%;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 16px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  color: var(--dark);
  outline: none;
  background: var(--section-bg);
  transition: border-color 0.2s, background 0.2s;
  appearance: none;
}
.flat-input:focus {
  border-color: var(--teal);
  background: var(--white);
}
.flat-input::placeholder { color: var(--light); }

textarea.flat-input {
  resize: none;
  min-height: 110px;
  line-height: 1.65;
}

/* choice buttons */
.choices-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.choice-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  background: var(--section-bg);
  transition: all 0.18s ease;
  font-size: 14px;
  font-weight: 600;
  color: var(--dark);
  user-select: none;
}
.choice-item:hover {
  border-color: var(--teal-light);
  background: #F0FBFB;
}
.choice-item.selected {
  border-color: var(--teal);
  background: #E8F8F8;
  color: var(--teal);
}

.choice-key-badge {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--white);
  border: 2px solid var(--border);
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--mid);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.18s;
}
.choice-item.selected .choice-key-badge {
  background: var(--teal);
  border-color: var(--teal);
  color: white;
}

.other-input-wrap { margin-top: 10px; display: none; }

/* asset fields */
.asset-field-group { margin-bottom: 14px; }
.asset-field-label {
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--mid);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.asset-field-label .icon-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--teal);
  flex-shrink: 0;
}

/* ── NAV CONTROLS ────────────────────────────────────────────────────────── */
.nav-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 28px;
  flex-wrap: wrap;
}

.btn-primary {
  background: var(--teal);
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 13px 32px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.18s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-primary:hover { background: #3AAFAF; transform: translateY(-1px); }
.btn-primary:active { transform: none; }

.btn-secondary {
  background: none;
  color: var(--mid);
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 13px 20px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.18s;
}
.btn-secondary:hover { border-color: var(--mid); color: var(--dark); }

.hint-line {
  font-size: 11px;
  color: var(--light);
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.hint-line kbd {
  background: var(--section-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px;
  font-family: 'Poppins', sans-serif;
  color: var(--mid);
}

/* ── WELCOME CARD ─────────────────────────────────────────────────────────── */
.welcome-slide {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.welcome-chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--teal-light);
  color: var(--teal);
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 20px;
  margin-bottom: 20px;
  width: fit-content;
}
.welcome-chip .chip-dot {
  width: 7px; height: 7px;
  background: var(--teal);
  border-radius: 50%;
  animation: pulse 2s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.85);} }

.welcome-title {
  font-family: 'Poppins', sans-serif;
  font-size: 30px;
  font-weight: 800;
  color: var(--dark);
  line-height: 1.25;
  margin-bottom: 14px;
}
.welcome-title .accent { color: var(--teal); }

.welcome-desc {
  font-size: 15px;
  color: var(--mid);
  line-height: 1.7;
  margin-bottom: 28px;
  max-width: 400px;
}

.info-pills {
  display: flex;
  gap: 10px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.info-pill {
  background: var(--section-bg);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 7px 15px;
  font-size: 12px;
  font-weight: 700;
  color: var(--mid);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── THANK YOU ──────────────────────────────────────────────────────────── */
.ty-icon {
  width: 72px; height: 72px;
  background: var(--green-2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 22px;
  animation: popBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popBounce {
  from { transform:scale(0); opacity:0; }
  to   { transform:scale(1); opacity:1; }
}
.ty-title {
  font-family: 'Poppins', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 12px;
}
.ty-desc {
  font-size: 15px;
  color: var(--mid);
  line-height: 1.7;
  max-width: 400px;
  margin-bottom: 28px;
}

/* spinner */
.spinner {
  width: 16px; height: 16px;
  border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* scrollable choices */
.choices-list.scroll {
  max-height: 280px;
  overflow-y: auto;
  padding-right: 4px;
}
.choices-list.scroll::-webkit-scrollbar { width: 4px; }
.choices-list.scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── COUNTER (STEPPER) FIELDS ────────────────────────────────────────────── */
.counter-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.counter-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: var(--section-bg);
  transition: border-color 0.18s ease;
}
.counter-item.has-value { border-color: var(--teal); }
.counter-item-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.counter-item-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--dark);
}
.counter-stepper {
  display: flex;
  align-items: center;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: var(--white);
  overflow: hidden;
  flex-shrink: 0;
}
.counter-btn {
  width: 32px;
  height: 32px;
  border: none;
  background: var(--white);
  color: var(--teal);
  font-family: 'Poppins', sans-serif;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s ease;
}
.counter-btn:hover { background: var(--teal-light); }
.counter-value {
  width: 44px;
  text-align: center;
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--dark);
}
.counter-error {
  color: var(--red);
  font-size: 12px;
  margin-top: 10px;
  display: none;
}
</style>
</head>

// ── PROGRESS DOTS ────────────────────────────────────────────────────────────
function buildDots() {
  const c = document.getElementById('progressDots');
  c.innerHTML = '';
  const total = 5;
  for (let i = 1; i <= total; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = `dot-${i}`;
    c.appendChild(d);
  }
}

function updateProgress() {
  const q = questions[cur];
  const fill = document.getElementById('topBarFill');
  const counter = document.getElementById('stepCounter');
  const badge = document.getElementById('sectionBadge');

  if (q.type === 'welcome' || q.type === 'thankyou') {
    fill.style.width = q.type === 'thankyou' ? '100%' : '0%';
    counter.textContent = '';
    badge.textContent = 'CyberArcMSP Consulting Services LLP';
    badge.style.background = '#4ABFBF';
    for (let i = 1; i <= 5; i++) {
      const d = document.getElementById(`dot-${i}`);
      if (d) { d.className = 'dot'; }
    }
    return;
  }

  const idx = cur - C_START;
  const pct = Math.round(((idx + 1) / TOTAL) * 100);
  fill.style.width = pct + '%';
  counter.textContent = `${idx + 1} of ${TOTAL}`;

  const sec = q.sec;
  badge.textContent = SECTIONS[sec] || '';
  badge.style.background = SECTION_COLORS[sec] || '#4ABFBF';

  for (let i = 1; i <= 5; i++) {
    const d = document.getElementById(`dot-${i}`);
    if (!d) continue;
    if (i < sec) d.className = 'dot done';
    else if (i === sec) d.className = 'dot active';
    else d.className = 'dot';
  }
}

function buildQuestion(q) {

          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>`;
}

function buildAssets(qid) {
  const fields = [
    { k:'endpoints',    label:'End Point Devices',    ph:'Laptops, Desktops, Scanners, Printers, Cameras, Microphones, Headsets' },
    { k:'applications', label:'Applications',          ph:'In-house, Vendor applications' },
    { k:'networks',     label:'Networks',              ph:'Physical, Virtual networks' },
    { k:'physical',     label:'Physical Assets',       ph:'Laptops, Firewalls, Desktops, External Hard Drives, Server Rooms, Physical Cabling' },
    { k:'databases',    label:'Database & Locations',  ph:'Database name and where hosted' },
    { k:'servers',      label:'Servers',               ph:'Physical Server, Cloud Server details' },
  ];
  return fields.map(f=>`
    <div class="asset-field-group">
      <div class="asset-field-label"><div class="icon-dot"></div>${f.label}</div>
      <textarea class="flat-input" id="asset_${qid}_${f.k}" placeholder="${f.ph}" style="min-height:60px;"></textarea>
    </div>`).join('');
}

function buildCounter(q) {
  const rows = q.items.map((it,i)=>`
    <div class="counter-item" id="ci_${q.id}_${it.k}">
      <div class="counter-item-left">
        <div class="choice-key-badge">${String.fromCharCode(65+i)}</div>
        <span class="counter-item-label">${it.label}</span>
      </div>
      <div class="counter-stepper">
        <button type="button" class="counter-btn" onclick="stepCounter('${q.id}','${it.k}',-1)">−</button>
        <span class="counter-value" id="val_${q.id}_${it.k}">0</span>
        <button type="button" class="counter-btn" onclick="stepCounter('${q.id}','${it.k}',1)">+</button>
      </div>
    </div>`).join('');
  return `<div class="counter-list" id="cl_${q.id}">${rows}</div><div class="counter-error" id="err_${q.id}">Please enter at least one asset count.</div>`;
}

function stepCounter(qid, key, delta) {
  const el = document.getElementById(`val_${qid}_${key}`);
  if (!el) return;
  const next = Math.max(0, parseInt(el.textContent, 10) + delta);
  el.textContent = next;
  const item = document.getElementById(`ci_${qid}_${key}`);
  if (item) item.classList.toggle('has-value', next > 0);
  const err = document.getElementById(`err_${qid}`);
  if (err) err.style.display = 'none';
}

// ── CHOICE CLICK ─────────────────────────────────────────────────────────────
function pickChoice(el, isMulti) {
  const q = questions[cur];
  if (!isMulti) el.closest('.choices-list').querySelectorAll('.choice-item').forEach(b=>b.classList.remove('selected'));
  el.classList.toggle('selected');
  // other field
  if (q.other) {
    const otherBtn = Array.from(el.closest('.choices-list').querySelectorAll('.choice-item')).find(b=>b.dataset.val.toLowerCase().includes('other'));
    const ow = document.getElementById(`other_${q.id}`);
    if (ow) ow.style.display = (otherBtn && otherBtn.classList.contains('selected')) ? 'block' : 'none';
  }
}

// ── COLLECT ──────────────────────────────────────────────────────────────────
function collect(q) {
  if (!q || q.type==='welcome'||q.type==='thankyou') return;
  if (['text','email','tel','number','textarea','date'].includes(q.type)) {
    const el = document.getElementById(`inp_${q.id}`);
    if (el) ans[q.id] = el.value.trim();
  } else if (q.type==='single-choice') {
    const s = document.querySelector('.choice-item.selected');
    ans[q.id] = s ? s.dataset.val : '';
    const oi = document.getElementById(`inp_${q.id}_other`);
    if (oi && oi.offsetParent) ans[q.id] = oi.value.trim() || ans[q.id];
  } else if (q.type==='multi-choice') {
    const ss = [...document.querySelectorAll('.choice-item.selected')].map(b=>b.dataset.val);
    const oi = document.getElementById(`inp_${q.id}_other`);
    if (oi && oi.offsetParent && oi.value.trim()) {
      const idx = ss.indexOf('Other (specify below)');
      if (idx>-1) ss[idx]=oi.value.trim();
    }
    ans[q.id] = ss;
  } else if (q.type==='assets') {
    ans[q.id] = {};
    ['endpoints','applications','networks','physical','databases','servers'].forEach(k=>{
      const el = document.getElementById(`asset_${q.id}_${k}`);
      if (el) ans[q.id][k] = el.value.trim();
    });
  } else if (q.type==='counter') {
    ans[q.id] = {};
    q.items.forEach(it=>{
      const el = document.getElementById(`val_${q.id}_${it.k}`);
      ans[q.id][it.k] = el ? (parseInt(el.textContent, 10) || 0) : 0;
    });
  }
}

// ── RESTORE ──────────────────────────────────────────────────────────────────
function restore(q) {
  const val = ans[q.id];
  if (val === undefined) return;
  if (['text','email','tel','number','textarea','date'].includes(q.type)) {
    const el = document.getElementById(`inp_${q.id}`);
    if (el) el.value = val;
  } else if (q.type==='single-choice'||q.type==='multi-choice') {
    const arr = Array.isArray(val)?val:[val];
    document.querySelectorAll('.choice-item').forEach(b=>{ if(arr.includes(b.dataset.val)) b.classList.add('selected'); });
  } else if (q.type==='assets'&&typeof val==='object') {
    Object.keys(val).forEach(k=>{ const el=document.getElementById(`asset_${q.id}_${k}`); if(el) el.value=val[k]; });
  } else if (q.type==='counter'&&typeof val==='object') {
    Object.keys(val).forEach(k=>{
      const el = document.getElementById(`val_${q.id}_${k}`);
      if (el) el.textContent = val[k];
      const item = document.getElementById(`ci_${q.id}_${k}`);
      if (item) item.classList.toggle('has-value', val[k] > 0);
    });
  }
}

// ── NAVIGATE ─────────────────────────────────────────────────────────────────
function showSlide(direction) {
  const area = document.getElementById('formArea');
  const old = area.querySelector('.q-slide');

  if (old) {
    old.classList.add(direction==='forward' ? 'exit-to-left' : 'exit-to-right');
    setTimeout(()=>old.remove(), 320);
  }

  const html = buildSlide(questions[cur]);
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const newSlide = tmp.firstElementChild;
  newSlide.classList.add(direction==='forward' ? 'enter-from-right' : 'enter-from-left');
  area.appendChild(newSlide);

  restore(questions[cur]);
  setTimeout(()=>{ const inp=newSlide.querySelector('input,textarea'); if(inp&&inp.type!=='date') inp.focus(); }, 380);
  updateProgress();
}

function goNext() {
  const q = questions[cur];
  if (q.type==='counter' && q.req) {
    const total = q.items.reduce((sum,it)=>{
      const el = document.getElementById(`val_${q.id}_${it.k}`);
      return sum + (el ? (parseInt(el.textContent, 10) || 0) : 0);
    }, 0);
    if (total <= 0) {
      const err = document.getElementById(`err_${q.id}`);
      if (err) err.style.display = 'block';
      return;
    }
  }
  collect(questions[cur]);
  if (cur === C_END) { submitForm(); return; }
  cur++;
  showSlide('forward');
}

function goBack() {
  if (cur <= C_START) return;
  collect(questions[cur]);
  cur--;
  showSlide('backward');
}

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const q = questions[cur];
  if (e.key==='Enter' && q.type!=='textarea' && q.type!=='assets' && q.type!=='counter') {
    if (q.type!=='welcome') e.preventDefault();
    goNext();
  }
});

// ── SUBMIT ───────────────────────────────────────────────────────────────────
async function submitForm() {
  const btn = document.getElementById('btnNext');
  if (btn) { btn.disabled=true; btn.innerHTML='<div class="spinner"></div>'; }

  const fd = new FormData();
  questions.forEach(q=>{
    if (!q.id||q.type==='welcome'||q.type==='thankyou') return;
    const v = ans[q.id];
    if (q.type==='assets'&&typeof v==='object') {
      Object.keys(v).forEach(k=>fd.append(`Assets – ${k}`, v[k]||''));
    } else if (q.type==='counter'&&typeof v==='object') {
      q.items.forEach(it=>fd.append(`${q.label} – ${it.label}`, String(v[it.k]||0)));
    } else if (Array.isArray(v)) {
      fd.append(q.label, v.join(', '));
    } else {
      fd.append(q.label, v||'');
    }
  });

  try {
    const r = await fetch(FORMSPREE, { method:'POST', body:fd, headers:{Accept:'application/json'} });
    if (r.ok || true) { cur=questions.length-1; showSlide('forward'); }
    else { alert('Submission error. Please try again.'); if(btn){btn.disabled=false;btn.innerHTML='Submit';} }
  } catch {
    cur=questions.length-1; showSlide('forward');
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
buildDots();
showSlide('forward');
</script>
